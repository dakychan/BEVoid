# ============================================================
# BEVoid — Android APK Build CI
# ============================================================
name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.2.11394342"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.2.11394342" >> $GITHUB_ENV

      - name: Install CMake
        run: |
          sdkmanager --install "cmake;3.22.1"
          echo "CMAKE_PATH=$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

      - name: Verify glad
        run: |
          if [ ! -f src/third_party/glad/glad.c ]; then
            echo "ERROR: glad.c not found!"
            exit 1
          fi
          echo "glad.c found"

      - name: CMake Configure (arm64-v8a)
        run: |
          mkdir -p build-android
          cd build-android
          $ANDROID_SDK_ROOT/cmake/3.22.1/bin/cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=21 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID=ON

      - name: Build .so
        run: |
          cd build-android
          cmake --build . --config Release -j$(nproc)
          ls -la libbevoid.so

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug || ../gradlew assembleDebug || true

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: bevoid-android-arm64
          path: build-android/libbevoid.so
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bevoid-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ABI: arm64-v8a" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Android 21+" >> $GITHUB_STEP_SUMMARY
          echo "- .so: build-android/libbevoid.so" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "- APK: android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_STEP_SUMMARY
          fi
